; =============================================================================
; firmware — ESP32-C6-WROOM-1: single MCU running everything.
;
; The board MCU owns:
;   - Game FSM (core/, game_state)
;   - Hall-effect sensor I²C bus (PCF8575 expanders)
;   - WS2812B LED strip (RMT-driven via FastLED)
;   - NimBLE peripheral exposing BoardState/PlayerInput/Identity/Slot
;
; FreeRTOS task layout (managed by main.cpp):
;   - core_task : 50 Hz tick — sensors, FSM, LEDs, BLE notify
;   - NimBLE host task is owned by the NimBLE stack
;
; Build envs:
;   pio run -e board     — production firmware for the C6
;   pio run -e debug_i2c — bare I²C expander monitor (sensor mapping aid)
;   pio run -e native    — host-side simulation of the pure game logic
; =============================================================================

[env:board]
platform        = espressif32
board           = esp32-c6-devkitc-1
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

build_flags =
    -DCATAN_LOG_LEVEL=3
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=4

lib_deps =
    fastled/FastLED       @ ^3.9.15
    h2zero/NimBLE-Arduino @ ^2.1.0
    nanopb/Nanopb         @ ^0.4.9

; =============================================================================
; Debug monitor — watches all PCF8575 expanders and logs input changes.
; Useful for mapping each sensor wire to its expander/bit.
; =============================================================================

[env:debug_i2c]
platform        = espressif32
board           = esp32-c6-devkitc-1
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

build_flags =
    -DCATAN_DEBUG_MONITOR

build_src_filter =
    -<*>
    +<main_debug.cpp>

; =============================================================================
; Native simulation — host-compiles only the pure modules + sim driver.
; No Arduino, no FastLED, no NimBLE, no nanopb.
; =============================================================================

[env:native]
platform     = platformio/native@^1.2.1
test_ignore  = *

build_flags =
    -std=gnu++17
    -Wall -Wextra
    -DCATAN_NATIVE_SIM
    -I src
    -I native

build_src_filter =
    -<*>
    +<core/>
    +<game_state.cpp>
    +<board_topology.cpp>
    +<dice.cpp>
    +<../native/>
