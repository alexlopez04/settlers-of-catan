; =============================================================================
; firmware/board — Arduino Mega 2560 (central board controller).
; =============================================================================

[env:megaatmega2560]
platform   = atmelavr
board      = megaatmega2560
framework  = arduino
monitor_speed = 115200

; Expand the Wire I2C buffers for the PCF8574 expander bus.
; Expand Serial1's RX ring-buffer (256 B) so multi-byte frames from the bridge
; never overflow between poll ticks.
build_flags =
    -DBUFFER_LENGTH=256
    -DTWI_BUFFER_LENGTH=256
    -DSERIAL_RX_BUFFER_SIZE=256

lib_deps =
    fastled/FastLED @ ^3.9.15
    nanopb/Nanopb   @ ^0.4.9

; =============================================================================
; Native simulation target — compiles the pure-logic modules for the host
; and drives them through scripted scenarios via firmware/board/native/sim_main.cpp.
; No Arduino, no FastLED, no sensor / LED / comm managers.
; =============================================================================

[env:native]
platform   = platformio/native@^1.2.1
test_ignore = *

build_flags =
    -std=gnu++17
    -Wall -Wextra
    -DCATAN_NATIVE_SIM
    -I src
    -I native

; Only compile the pure modules plus the sim driver.
build_src_filter =
    -<*>
    +<core/>
    +<game_state.cpp>
    +<board_topology.cpp>
    +<dice.cpp>
    +<../native/>

