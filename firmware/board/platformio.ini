; =============================================================================
; firmware/board — Arduino Mega 2560 (central board controller).
; =============================================================================

[env:megaatmega2560]
platform   = atmelavr
board      = megaatmega2560
framework  = arduino
monitor_speed = 115200

; Expand the Wire I2C buffers for the PCF8574 expander bus.
; Expand Serial1's RX ring-buffer (256 B) so multi-byte frames from the bridge
; never overflow between poll ticks.
build_flags =
    -DBUFFER_LENGTH=256
    -DTWI_BUFFER_LENGTH=256
    -DSERIAL_RX_BUFFER_SIZE=256

lib_deps =
    fastled/FastLED @ ^3.9.15
    nanopb/Nanopb   @ ^0.4.9
