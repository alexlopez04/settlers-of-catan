; =============================================================================
; firmware/player — Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262)
;
; Role: one of four player stations.
;   - LoRa uplink/downlink to the bridge.
;   - Built-in I2C SSD1306 OLED (128x64) displays game state.
;   - NimBLE peripheral exposes game state to the mobile app.
;   - 3 optional buttons for semantic actions.
;
; Build one environment per player — each compiles with a distinct
; CATAN_PLAYER_ID so the same source produces 4 firmwares.
;     pio run -e player0 -t upload
;     pio run -e player1 -t upload   ... etc.
; =============================================================================

[env]
platform      = espressif32
board         = heltec_wifi_lora_32_V3
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    jgromes/RadioLib        @ ^6.6.0
    olikraus/U8g2           @ ^2.35.30
    h2zero/NimBLE-Arduino   @ ^1.4.2
    nanopb/Nanopb           @ ^0.4.9

[env:player0]
build_flags = ${env.build_flags} -DCATAN_PLAYER_ID=0

[env:player1]
build_flags = ${env.build_flags} -DCATAN_PLAYER_ID=1

[env:player2]
build_flags = ${env.build_flags} -DCATAN_PLAYER_ID=2

[env:player3]
build_flags = ${env.build_flags} -DCATAN_PLAYER_ID=3
