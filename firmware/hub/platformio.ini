; =============================================================================
; firmware/hub — ESP32-C6-WROOM-1 (single BLE bridge for all four players).
;
; Role: one-and-only bluetooth ↔ Mega bridge.
;   - NimBLE peripheral that accepts up to 4 simultaneous mobile connections.
;   - Persistent client_id → player_slot mapping in NVS so reconnects keep
;     the same seat.
;   - Framed UART link to the Arduino Mega (Serial1 on the ESP, Serial1 on
;     the Mega) — sends PlayerInput + PlayerPresence, receives BoardState.
; =============================================================================

[env:hub]
platform      = espressif32
board         = esp32-c6-devkitc-1
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DCATAN_LOG_LEVEL=3
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=4

lib_deps =
    h2zero/NimBLE-Arduino @ ^2.1.0
    nanopb/Nanopb         @ ^0.4.9
