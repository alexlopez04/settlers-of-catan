; =============================================================================
; firmware/bridge — Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262)
;
; Role: I2C slave to the Arduino Mega (address 0x30) and LoRa transceiver
; bridging BoardState / PlayerInput frames to/from the 4 player stations.
; =============================================================================

[env:heltec_wifi_lora_32_V3]
platform      = espressif32
board         = heltec_wifi_lora_32_V3
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DCATAN_ROLE_BRIDGE
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    jgromes/RadioLib    @ ^6.6.0
    olikraus/U8g2       @ ^2.35.30
    nanopb/Nanopb       @ ^0.4.9
