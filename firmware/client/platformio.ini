; =============================================================================
; firmware/client — Catan ESP32-C6 handheld client.
;
; Role: BLE central that connects to the "Catan-Board" hub, decodes
;   BoardState, drives a 128x64 OLED over I²C, and sends PlayerInput
;   actions via three physical buttons.
;
; Target hardware:
;   - ESP32-C6-WROOM-1 module (any DevKitC-1 compatible carrier)
;   - SSD1306 128×64 OLED on I²C (address 0x3C, default)
;   - Three momentary push-buttons (Active-LOW with internal pull-ups)
; =============================================================================

[env:client]
platform      = espressif32
board         = esp32-c6-devkitc-1
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DCATAN_LOG_LEVEL=3

lib_deps =
    h2zero/NimBLE-Arduino @ ^2.1.0
    nanopb/Nanopb         @ ^0.4.9
    olikraus/U8g2         @ ^2.35.7
