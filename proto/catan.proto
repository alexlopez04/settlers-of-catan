syntax = "proto3";

package catan;

// =============================================================================
// Settlers of Catan — wire protocol (v3)
//
// Architecture (all links share the same framing and both messages):
//
//   [Arduino Mega board]  --I2C master-->  [Heltec V3 bridge]
//   [Heltec V3 bridge]    --LoRa-->        [Heltec V3 player x4]
//   [Heltec V3 player]    --BLE-->         [mobile app]
//
// Board  -> Bridge -> Player -> Mobile :  BoardState
// Mobile -> Player -> Bridge -> Board  :  PlayerInput
//
// Wire frame (on every hop — I2C, LoRa, BLE):
//
//   [0xCA magic] [len: uint8] [nanopb payload: len bytes]
//
// Receivers MUST discard frames whose first byte is not 0xCA.
// Maximum payload length is 200 bytes.
//
// Schema version: 3 — increment whenever field semantics change.
// =============================================================================

enum GamePhase {
  PHASE_LOBBY             = 0;
  PHASE_BOARD_SETUP       = 1;
  PHASE_NUMBER_REVEAL     = 2;
  PHASE_INITIAL_PLACEMENT = 3;
  PHASE_PLAYING           = 4;
  PHASE_ROBBER            = 5;
  PHASE_GAME_OVER         = 6;
}

enum PlayerAction {
  ACTION_NONE        = 0;
  ACTION_READY       = 1;
  ACTION_START_GAME  = 2;
  ACTION_NEXT_NUMBER = 3;
  ACTION_PLACE_DONE  = 4;
  ACTION_ROLL_DICE   = 5;
  ACTION_END_TURN    = 6;
  ACTION_SKIP_ROBBER = 7;
  ACTION_REPORT      = 8;
}

// Biome codes (packed into `tiles_packed` high nibble of each byte).
// Keep in sync with Biome enum in board firmware.
//   0 = DESERT, 1 = FOREST, 2 = PASTURE, 3 = FIELD, 4 = HILL, 5 = MOUNTAIN
//
// Each byte of `tiles_packed` encodes one tile:
//   high nibble = biome (0..5)
//   low  nibble = number (0..12; 0 = desert/no number)
// The robber lives on tile index `robber_tile`.

message BoardState {
  uint32    proto_version  = 1;
  GamePhase phase          = 2;
  uint32    num_players    = 3;
  uint32    current_player = 4;
  uint32    setup_round    = 5;
  bool      has_rolled     = 6;
  uint32    die1           = 7;
  uint32    die2           = 8;
  uint32    reveal_number  = 9;
  uint32    winner_id      = 10;
  uint32    robber_tile    = 11;
  uint32    connected_mask = 12;
  bytes     tiles_packed   = 13;   // 19 bytes, one per tile (see above)
  repeated uint32 vp       = 14;   // self-reported VP per player
}

message PlayerInput {
  uint32       proto_version = 1;
  uint32       player_id     = 2;
  PlayerAction action        = 3;
  uint32 vp         = 10;
  uint32 res_lumber = 11;
  uint32 res_wool   = 12;
  uint32 res_grain  = 13;
  uint32 res_brick  = 14;
  uint32 res_ore    = 15;
}
