syntax = "proto3";

package catan;

// =============================================================================
// Settlers of Catan — wire protocol (v6)
//
// Architecture:
//
//   [Arduino Mega board]  <--UART(Serial1)-->  [ESP32-C6 player hub]  <--BLE-->  [up to 4 mobiles]
//
// One Mega owns the game FSM, LEDs, and the I2C bus to the PCF8574 sensor
// expanders. One ESP32-C6 owns BLE — it accepts up to four concurrent
// connections from mobile devices, assigns each device a stable player
// slot (0..3), and bridges traffic to/from the Mega over a UART link.
//
// UART frame (both directions):
//
//   [ 0xCA magic ][ type : uint8 ][ len : uint8 ][ nanopb payload : len bytes ][ crc8 : uint8 ]
//
// Type codes:
//   0x01  BoardState     (Mega -> hub -> mobiles, broadcast)
//   0x02  PlayerInput    (mobile -> hub -> Mega)
//   0x03  PlayerPresence (hub -> Mega, whenever the connected slot mask changes)
//
// CRC-8 (poly 0x07, init 0x00) covers [type, len, payload]. Receivers MUST
// drop frames that fail CRC or whose first byte is not 0xCA.
//
// BLE wire format (per connection):
//   mobile -> hub:  bare nanopb PlayerInput bytes (no header — ATT carries length)
//   hub -> mobile:  bare nanopb BoardState bytes  (notify on state characteristic)
//
// Schema version: 6 — single-hub redesign (no per-player I2C slaves), adds
// PlayerPresence, ACTION_READY, and PlayerInput.client_id for identity.
// =============================================================================

// ----- Enums ----------------------------------------------------------------

enum GamePhase {
  PHASE_LOBBY             = 0;
  PHASE_BOARD_SETUP       = 1;
  PHASE_NUMBER_REVEAL     = 2;
  PHASE_INITIAL_PLACEMENT = 3;
  PHASE_PLAYING           = 4;
  PHASE_ROBBER            = 5;
  PHASE_GAME_OVER         = 6;
}

enum PlayerAction {
  ACTION_NONE        = 0;
  ACTION_READY       = 1;
  ACTION_START_GAME  = 2;
  ACTION_NEXT_NUMBER = 3;
  ACTION_PLACE_DONE  = 4;
  ACTION_ROLL_DICE   = 5;
  ACTION_END_TURN    = 6;
  ACTION_SKIP_ROBBER = 7;
  ACTION_REPORT      = 8;
}

// Biome codes (packed into BoardState.tiles_packed high nibble of each byte).
//   0 = DESERT, 1 = FOREST, 2 = PASTURE, 3 = FIELD, 4 = HILL, 5 = MOUNTAIN
//
// Each byte of `tiles_packed` encodes one tile:
//   high nibble = biome (0..5)
//   low  nibble = number token (0..12; 0 = desert / no token)
// The robber lives on tile index `robber_tile`.

// ----- Messages -------------------------------------------------------------

message BoardState {
  uint32    proto_version  = 1;
  GamePhase phase          = 2;
  uint32    num_players    = 3;
  uint32    current_player = 4;
  uint32    setup_round    = 5;
  bool      has_rolled     = 6;
  uint32    die1           = 7;
  uint32    die2           = 8;
  uint32    reveal_number  = 9;
  uint32    winner_id      = 10;   // 0xFF if no winner yet
  uint32    robber_tile    = 11;   // 0xFF if unplaced
  uint32    connected_mask = 12;   // bit i set => player i has a phone connected
  bytes     tiles_packed   = 13;   // 19 bytes, one per tile (see above)
  repeated uint32 vp       = 14;   // self-reported VP per player, max 4
  repeated uint32 ready    = 15;   // 0/1 ready flag per player slot, max 4

  // Settlements / cities per vertex (54 vertices, packed as 27 bytes).
  //   low nibble  = vertex 2*i     high nibble = vertex 2*i + 1
  //   nibble value:
  //     0x0..0x3 = settlement owned by player 0..3
  //     0x4..0x7 = city       owned by player 0..3 (owner = nibble & 0x3)
  //     0xF      = empty
  // The final nibble (index 54) is unused and is always 0xF.
  bytes vertex_owners = 16;

  // Roads per edge (72 edges, packed as 36 bytes).
  //   low nibble  = edge 2*i     high nibble = edge 2*i + 1
  //   nibble value:
  //     0x0..0x3 = road owned by player 0..3
  //     0xF      = empty
  bytes edge_owners = 17;

  // Self-reported resource counts per player (via ACTION_REPORT), persisted
  // so the board can restore a reconnecting mobile's hand. Index = player id.
  repeated uint32 res_lumber = 20;
  repeated uint32 res_wool   = 21;
  repeated uint32 res_grain  = 22;
  repeated uint32 res_brick  = 23;
  repeated uint32 res_ore    = 24;
}

message PlayerInput {
  uint32       proto_version = 1;
  uint32       player_id     = 2;
  PlayerAction action        = 3;

  // Optional stable identifier of the originating mobile device. The hub
  // already tags every input with the authoritative player_id derived from
  // the BLE connection slot, so client_id is informational only (used by
  // the Mega for diagnostics and by the hub for slot persistence).
  string client_id = 4;

  // Fields below populated only for ACTION_REPORT.
  uint32 vp         = 10;
  uint32 res_lumber = 11;
  uint32 res_wool   = 12;
  uint32 res_grain  = 13;
  uint32 res_brick  = 14;
  uint32 res_ore    = 15;
}

// PlayerPresence — sent by the hub to the Mega whenever the set of
// connected mobile devices changes. The Mega uses this to drive the lobby
// LED feedback and to know how many seats are filled.
message PlayerPresence {
  uint32 proto_version  = 1;
  uint32 connected_mask = 2;   // bit i set => slot i has a phone connected

  // Stable client_id per slot (empty string if the slot is vacant). Lets
  // the Mega log which devices are seated where without needing its own
  // BLE stack.
  repeated string client_ids = 3;
}
